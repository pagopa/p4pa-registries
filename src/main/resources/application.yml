server:
  http: "\${SERVER_PORT:8080}"

spring:
  application:
    name: ${artifactId}
    version: ${version}
  jmx.enabled: true
  threads:
    virtual:
      enabled: "\${VIRTUAL_THREADS_ENABLED:true}"
  data:
    rest:
      basePath: crud
  mongodb:
    uri: "\${MONGODB_URI:mongodb://localhost:27017}"
    database: "\${MONGODB_DBNAME:payhub}"
    # custom configured properties
    config:
      connectionPool:
        maxSize: "\${MONGODB_CONNECTIONPOOL_MAX_SIZE:100}"
        minSize: "\${MONGODB_CONNECTIONPOOL_MIN_SIZE:0}"
        maxWaitTimeMS: "\${MONGODB_CONNECTIONPOOL_MAX_WAIT_MS:120000}"
        maxConnectionLifeTimeMS: "\${MONGODB_CONNECTIONPOOL_MAX_CONNECTION_LIFE_MS:0}"
        maxConnectionIdleTimeMS: "\${MONGODB_CONNECTIONPOOL_MAX_CONNECTION_IDLE_MS:120000}"
        maxConnecting: "\${MONGODB_CONNECTIONPOOL_MAX_CONNECTING:2}"
  cloud:
    function:
      definition: paymentsConsumer;registryEventsConsumer
    stream:
      binders:
        kafka-payments-consumer:
          type: kafka
          environment:
            spring.cloud.stream.kafka.binder:
              brokers: "\${KAFKA_PAYMENTS_BINDER_BROKER:\${KAFKA_BINDER_BROKER:}}"
              configuration:
                sasl.jaas.config: "\${KAFKA_PAYMENTS_CONSUMER_SASL_JAAS_CONFIG:}"
        kafka-registries-consumer:
          type: kafka
          environment:
            spring.cloud.stream.kafka.binder:
              brokers: "\${KAFKA_REGISTRIES_BINDER_BROKER:\${KAFKA_BINDER_BROKER:}}"
              configuration:
                sasl.jaas.config: "\${KAFKA_REGISTRIES_CONSUMER_SASL_JAAS_CONFIG:}"
      bindings:
        paymentsConsumer-in-0:
          binder: kafka-payments-consumer
          content-type: "\${KAFKA_CONTENT_TYPE:application/json}"
          destination: "\${KAFKA_TOPIC_PAYMENTS:p4pa-payhub-payments-evh}"
          group: "\${KAFKA_PAYMENTS_GROUP_ID:p4pa-payments-consumer-group}"
          consumer.auto-startup: "\${KAFKA_PAYMENTS_CONSUMER_ENABLED:true}"
        registryEventsConsumer-in-0:
          binder: kafka-registries-consumer
          content-type: "\${KAFKA_CONTENT_TYPE:application/json}"
          destination: "\${KAFKA_TOPIC_REGISTRIES:p4pa-payhub-registries-evh}"
          group: "\${KAFKA_REGISTRIES_GROUP_ID:p4pa-registries-consumer-group}"
          consumer.auto-startup: "\${KAFKA_REGISTRIES_CONSUMER_ENABLED:true}"
      kafka:
        binder:
          auto-create-topics: false
          configuration:
            heartbeat.interval.ms: "\${KAFKA_CONFIG_HEARTBEAT_INTERVAL_MS:3000}"
            session.timeout.ms: "\${KAFKA_CONFIG_SESSION_TIMEOUT_MS:30000}"
            request.timeout.ms: "\${KAFKA_CONFIG_REQUEST_TIMEOUT_MS:60000}"
            metadata.max.age.ms: "\${KAFKA_CONFIG_METADATA_MAX_AGE:180000}"
            sasl.mechanism: "\${KAFKA_CONFIG_SASL_MECHANISM:PLAIN}"
            security.protocol: "\${KAFKA_CONFIG_SECURITY_PROTOCOL:SASL_SSL}"
            max.request.size: "\${KAFKA_CONFIG_MAX_REQUEST_SIZE:1000000}"
        binders:
          paymentsConsumer-in-0:
            consumer:
              autoCommitOffset: "\${KAFKA_PAYMENTS_AUTO_COMMIT:\${KAFKA_CONSUMER_CONFIG_AUTO_COMMIT:true}}"
              configuration:
                connections.max.idle.ms: "\${KAFKA_PAYMENTS_REQUEST_CONNECTIONS_MAX_IDLE_MS:\${KAFKA_CONSUMER_CONFIG_CONNECTIONS_MAX_IDLE_MS:180000}}"
                max.poll:
                  interval.ms: "\${KAFKA_PAYMENTS_INTERVAL_TIMEOUT_MS:\${KAFKA_CONFIG_MAX_POLL_INTERVAL_TIMEOUT_MS:300000}}"
                  records: "\${KAFKA_PAYMENTS_MAX_POLL_SIZE:\${KAFKA_CONSUMER_CONFIG_MAX_POLL_SIZE:500}}"
                socket.connection.setup.timeout:
                  max.ms: "\${KAFKA_PAYMENTS_REQUEST_CONNECTION_TIMEOUT_MAX_MS:\${KAFKA_CONSUMER_CONFIG_CONNECTION_TIMEOUT_MAX_MS:200000}}"
                  ms: "\${KAFKA_PAYMENTS_REQUEST_CONNECTION_TIMEOUT_MS:\${KAFKA_CONSUMER_CONFIG_CONNECTION_TIMEOUT_MS:100000}}"
              standardHeaders: "\${KAFKA_PAYMENTS_STANDARD_HEADERS:\${KAFKA_CONSUMER_CONFIG_STANDARD_HEADERS:both}}"
              startOffset: "\${KAFKA_PAYMENTS_REQUEST_START_OFFSET:\${KAFKA_CONSUMER_CONFIG_START_OFFSET:earliest}}"
          registryEventsConsumer-in-0:
            consumer:
              autoCommitOffset: "\${KAFKA_REGISTRIES_AUTO_COMMIT:\${KAFKA_CONSUMER_CONFIG_AUTO_COMMIT:true}}"
              configuration:
                connections.max.idle.ms: "\${KAFKA_REGISTRIES_REQUEST_CONNECTIONS_MAX_IDLE_MS:\${KAFKA_CONSUMER_CONFIG_CONNECTIONS_MAX_IDLE_MS:180000}}"
                max.poll:
                  interval.ms: "\${KAFKA_REGISTRIES_INTERVAL_TIMEOUT_MS:\${KAFKA_CONFIG_MAX_POLL_INTERVAL_TIMEOUT_MS:300000}}"
                  records: "\${KAFKA_REGISTRIES_MAX_POLL_SIZE:\${KAFKA_CONSUMER_CONFIG_MAX_POLL_SIZE:500}}"
                socket.connection.setup.timeout:
                  max.ms: "\${KAFKA_REGISTRIES_REQUEST_CONNECTION_TIMEOUT_MAX_MS:\${KAFKA_CONSUMER_CONFIG_CONNECTION_TIMEOUT_MAX_MS:200000}}"
                  ms: "\${KAFKA_REGISTRIES_REQUEST_CONNECTION_TIMEOUT_MS:\${KAFKA_CONSUMER_CONFIG_CONNECTION_TIMEOUT_MS:100000}}"
              standardHeaders: "\${KAFKA_REGISTRIES_STANDARD_HEADERS:\${KAFKA_CONSUMER_CONFIG_STANDARD_HEADERS:both}}"
              startOffset: "\${KAFKA_REGISTRIES_REQUEST_START_OFFSET:\${KAFKA_CONSUMER_CONFIG_START_OFFSET:earliest}}"


management:
  info:
    build.enabled: true
    java.enabled: true
    git.enabled: true
  otlp.metrics.export.enabled: "\${TRACING_EXPORT:false}"
  tracing:
    sampling.probability: "\${TRACING_SAMPLING_PROBABILITY:1.0}"
    baggage.remote-fields:
      - X-user-id
  observations:
    http.server:
      filter.order: -100
  endpoints:
    jmx:
      exposure.include: "*"
    web:
      exposure:
        include: health, info, prometheus, metrics
      base-path: /actuator
  endpoint:
    health:
      probes.enabled: true
      logging.slow-indicator-threshold: "\${HEALTH_ACTUATOR_LOGGER_TIMEOUT_DURATION:PT1S}"
      show-details: "\${HEALTH_ACTUATOR_SHOW_DETAILS:when-authorized}"
      group:
        readiness.include: "*"
        liveness.include: livenessState,diskSpace,ping,binders
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${artifactId}
    export:
      prometheus:
        enabled: true
        step: 1m
        descriptions: true
    enable:
      jvm: true
      process: true
      system: true
      http: true
      logback: true

springwolf:
  docket:
    base-package: it.gov.pagopa.pu.registry.event
    info:
      title: "\${spring.application.name}"
      version: "\${spring.application.version}"
      description: AsyncAPI And Models
    servers.kafka-server:
      protocol: kafka
      host: "\${KAFKA_BINDER_BROKER:localhost:9093}"
  use-fqn: false

logging:
  level:
    root: "\${LOG_LEVEL_ROOT:INFO}"
    it.gov.pagopa: "\${LOG_LEVEL_PAGOPA:INFO}"
    org.springframework: "\${LOG_LEVEL_SPRING:INFO}"
    org.springframework.boot.availability: "\${LOG_LEVEL_SPRING_BOOT_AVAILABILITY:DEBUG}"
    org.springframework.kafka: "\${LOG_LEVEL_SPRING_KAFKA:INFO}"
    org.apache.kafka.clients.consumer.internals.ConsumerCoordinator: "\${LOG_LEVEL_KAFKA_CONSUMER_COORDINATOR:WARN}"
    org.apache.kafka.clients.admin.internals.AdminMetadataManager: "\${LOG_LEVEL_KAFKA_ADMIN_METADATA_MANAGER:WARN}"
    it.gov.pagopa.pu.registry.exception.ControllerExceptionHandler: "\${LOGGING_LEVEL_API_REQUEST_EXCEPTION:INFO}"
    org.springdoc.core.utils.SpringDocAnnotationsUtils: "\${LOG_LEVEL_SPRING_DOC:ERROR}"
    PERFORMANCE_LOG: "\${LOG_LEVEL_PERFORMANCE_LOG:INFO}"
    PERFORMANCE_LOG.API_REQUEST: "\${LOG_LEVEL_PERFORMANCE_LOG_API_REQUEST:\${logging.level.PERFORMANCE_LOG}}"
    PERFORMANCE_LOG.REST_INVOKE: "\${LOG_LEVEL_PERFORMANCE_LOG_REST_INVOKE:\${logging.level.PERFORMANCE_LOG}}"
    PERFORMANCE_LOG.INCOMING_EVENT: "\${LOG_LEVEL_PERFORMANCE_LOG_INCOMING_EVENT:\${logging.level.PERFORMANCE_LOG}}"

springdoc:
  api-docs.version: openapi_3_0
  writer-with-default-pretty-printer: true

